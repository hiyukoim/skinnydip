<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skinnydip</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F6D5D5;
      min-height: 100vh;
      font-family: 'Space Mono', monospace;
      color: #1a1a1a;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .window {
      background: #FAF4E6;
      border: 2px solid #1a1a1a;
      box-shadow: 4px 4px 0 #1a1a1a;
      margin-bottom: 20px;
    }

    .window-header {
      background: linear-gradient(to right, #1a1a1a 0%, #1a1a1a 100%);
      color: #FAF4E6;
      padding: 8px 12px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .window-buttons {
      display: flex;
      gap: 6px;
    }

    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid #1a1a1a;
    }

    .btn-close { background: #FF6B6B; }
    .btn-min { background: #FFE66D; }
    .btn-max { background: #4ECB71; }

    .window-title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .window-content {
      padding: 20px;
    }

    .logo {
      font-family: 'VT323', monospace;
      font-size: 48px;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .tagline {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .channel-list {
      list-style: none;
    }

    .channel-item {
      border: 2px solid #1a1a1a;
      margin-bottom: 12px;
      background: #fff;
      transition: all 0.1s ease;
    }

    .channel-item:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #1a1a1a;
    }

    .channel-item:active {
      transform: translate(0, 0);
      box-shadow: none;
    }

    .channel-link {
      display: block;
      padding: 16px;
      text-decoration: none;
      color: inherit;
    }

    .channel-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .channel-meta {
      font-size: 11px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    .play-icon {
      display: inline-block;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid #1a1a1a;
      margin-right: 10px;
      vertical-align: middle;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #999;
      margin-top: 30px;
      padding: 20px;
    }

    .footer a {
      color: #666;
    }

    .api-links {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px dashed #ccc;
      font-size: 11px;
      color: #888;
    }

    .api-links a {
      color: #666;
      margin: 0 8px;
    }

    .time {
      font-family: 'VT323', monospace;
      font-size: 24px;
      text-align: center;
      margin-bottom: 20px;
      color: #666;
    }

    .palm {
      text-align: center;
      font-size: 32px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="window">
      <div class="window-header">
        <div class="window-buttons">
          <div class="window-btn btn-close"></div>
          <div class="window-btn btn-min"></div>
          <div class="window-btn btn-max"></div>
        </div>
        <div class="window-title">Skinnydip</div>
        <div style="width: 54px;"></div>
      </div>
      <div class="window-content">
        <div class="palm">🌴</div>
        <div class="logo">SKINNYDIP</div>
        <div class="tagline">Ultra-summer streaming radio</div>
        <div class="time" id="clock"></div>

        <ul class="channel-list">
          {{CHANNELS}}
        </ul>

        <div class="api-links">
          API:
          <a href="/channels">/channels</a>
          <a href="/health">/health</a>
        </div>
      </div>
    </div>

    <div class="footer">
      Open any stream URL in VLC, Sonos, or your favorite audio player.<br>
      <br>
      Powered by <a href="https://poolsuite.net" target="_blank">Poolsuite</a> ☼
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
      const day = days[now.getDay()];
      const date = now.getDate();
      const month = months[now.getMonth()];
      const hours = String(now.getHours()).padStart(2, '0');
      const mins = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${day} ${date} ${month} ${hours}:${mins}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
